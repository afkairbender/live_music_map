# TEMPORARY — validates the live concert data sources used by src/lib/concerts.js
# against real endpoints for European cities. Will be removed once verified.
name: validate-concert-sources

on:
  push:
    branches: ["claude/awesome-sagan-k35bv4"]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: RA areas search for European cities
        run: |
          set +e
          UA='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
          for city in berlin london paris amsterdam barcelona lisbon prague copenhagen; do
            echo "::group::areas: $city"
            BODY=$(jq -n --arg c "$city" '{query:"query($searchTerm: String!) { areas(searchTerm: $searchTerm, limit: 8) { id name country { name } } }", variables:{searchTerm:$c}}')
            curl -sS -m 25 -X POST https://ra.co/graphql \
              -H 'Content-Type: application/json' \
              -H "User-Agent: $UA" \
              -H 'Referer: https://ra.co/events' \
              -H 'Origin: https://ra.co' \
              --data "$BODY" \
              -w '\nHTTP %{http_code}\n' | head -c 2000
            echo
            echo "::endgroup::"
          done
          true

      - name: RA eventListings for Berlin (exact app query)
        run: |
          set +e
          UA='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
          Q='query($filters: FilterInputDtoInput, $page: Int, $pageSize: Int) { eventListings(filters: $filters, pageSize: $pageSize, page: $page) { data { id listingDate event { id title date startTime contentUrl venue { name } artists { name } } } totalResults } }'
          AREAS=$(jq -n '{query:"query($searchTerm: String!) { areas(searchTerm: $searchTerm, limit: 8) { id name country { name } } }", variables:{searchTerm:"berlin"}}' | \
            curl -sS -m 25 -X POST https://ra.co/graphql -H 'Content-Type: application/json' -H "User-Agent: $UA" -H 'Referer: https://ra.co/events' --data @-)
          echo "areas response: $AREAS" | head -c 1000; echo
          AREA=$(echo "$AREAS" | jq -r '.data.areas[] | select(.country.name=="Germany") | .id' 2>/dev/null | head -1)
          echo "resolved Berlin area id: ${AREA:-NONE}"
          [ -z "$AREA" ] && AREA=34 && echo "falling back to area 34"
          GTE="$(date -u +%F)T00:00:00.000Z"
          LTE="$(date -u -d '+7 days' +%F)T23:59:59.999Z"
          BODY=$(jq -n --arg q "$Q" --argjson a "$AREA" --arg gte "$GTE" --arg lte "$LTE" \
            '{query:$q, variables:{filters:{areas:{eq:$a}, listingDate:{gte:$gte, lte:$lte}}, pageSize:20, page:1}}')
          curl -sS -m 25 -X POST https://ra.co/graphql \
            -H 'Content-Type: application/json' \
            -H "User-Agent: $UA" \
            -H 'Referer: https://ra.co/events' \
            --data "$BODY" \
            -w '\nHTTP %{http_code}\n' | head -c 4000
          echo
          true

      - name: Bandsintown events + CORS headers
        run: |
          set +e
          FROM=$(date -u +%F)
          TO=$(date -u -d '+90 days' +%F)
          for artist in 'Peggy%20Gou' 'Four%20Tet' 'Bicep'; do
            echo "::group::bandsintown: $artist (app_id=live_music_map)"
            curl -sS -m 25 -D /tmp/h -o /tmp/b \
              "https://rest.bandsintown.com/artists/$artist/events?app_id=live_music_map&date=$FROM%2C$TO" \
              -H 'Accept: application/json' \
              -H 'Origin: https://example.netlify.app'
            echo "--- response headers ---"; cat /tmp/h
            echo "--- body (truncated) ---"; head -c 2000 /tmp/b; echo
            echo "::endgroup::"
          done
          echo "::group::bandsintown alternate app_ids (if enforcement applies)"
          for id in js_widget squarespace 1f2e3d4c; do
            CODE=$(curl -sS -m 25 -o /tmp/b2 -w '%{http_code}' \
              "https://rest.bandsintown.com/artists/Peggy%20Gou/events?app_id=$id&date=$FROM%2C$TO" -H 'Accept: application/json')
            echo "app_id=$id -> HTTP $CODE: $(head -c 300 /tmp/b2)"
          done
          echo "::endgroup::"
          true
